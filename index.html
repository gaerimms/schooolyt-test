<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Firebase YT Player</title>

<style>
body { background:#0d1117; color:white; text-align:center; font-family:Arial; }
input,button { padding:10px; margin:5px; border-radius:8px; border:none; }
.player { width:80%; margin:auto; padding-top:56.25%; position:relative; }
iframe { position:absolute; width:100%; height:100%; }
</style>
</head>

<body>

<h1>🔥 Firebase YT Player</h1>

<input id="email" placeholder="이메일">
<input id="pw" type="password" placeholder="비밀번호">

<button onclick="register()">회원가입</button>
<button onclick="login()">로그인</button>
<button onclick="logout()">로그아웃</button>

<br><br>

<input id="title" placeholder="곡 제목">
<input id="vid" placeholder="YouTube ID">
<button onclick="add()">추가</button>

<div class="player">
<iframe id="player"></iframe>
</div>

<div id="list"></div>

<script type="module">

// 🔥 Firebase 연결
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 👇 여기에 네 config 붙여넣기
const firebaseConfig = {
  apiKey: "여기",
  authDomain: "여기",
  projectId: "여기",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user=null;
let list=[];

// 회원가입
window.register = async ()=>{
  const email=document.getElementById("email").value;
  const pw=document.getElementById("pw").value;

  await createUserWithEmailAndPassword(auth,email,pw);
  alert("가입 완료");
};

// 로그인
window.login = async ()=>{
  const email=document.getElementById("email").value;
  const pw=document.getElementById("pw").value;

  const res = await signInWithEmailAndPassword(auth,email,pw);
  user=res.user;

  load();
  alert("로그인 성공");
};

// 로그아웃
window.logout = async ()=>{
  await signOut(auth);
  user=null;
  list=[];
  render();
};

// 저장
async function save(){
  if(!user) return;

  await setDoc(doc(db,"users",user.uid),{
    list:list
  });
}

// 불러오기
async function load(){
  const ref=doc(db,"users",user.uid);
  const snap=await getDoc(ref);

  if(snap.exists()){
    list=snap.data().list;
  }else{
    list=[];
  }

  render();
}

// 추가
window.add = ()=>{
  const t=document.getElementById("title").value;
  const id=document.getElementById("vid").value;

  list.push({title:t,id:id});
  save();
  render();
};

// 재생
window.play = (id)=>{
  document.getElementById("player").src=
  `https://www.youtube.com/embed/${id}?autoplay=1`;
};

// 화면
function render(){
  const box=document.getElementById("list");
  box.innerHTML="";

  list.forEach(v=>{
    let d=document.createElement("div");

    d.innerHTML=`
    <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
    <span onclick="play('${v.id}')">${v.title}</span>
    `;

    box.appendChild(d);
  });
}

</script>

</body>
</html>
