<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SPOTIFY STYLE PLAYER FINAL</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* 플레이어 */
.player{
    max-width:400px;
    margin:40px auto;
    background:#181818;
    padding:20px;
    border-radius:20px;
}

img{
    width:100%;
    border-radius:12px;
}

.controls button{
    margin:5px;
    padding:10px;
    border-radius:50%;
    border:none;
    background:#1db954;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.progress{
    width:100%;
}

.list{
    max-width:400px;
    margin:auto;
    text-align:left;
}

.item{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.active{
    color:#1db954;
}
</style>
</head>

<body>

<h1>🎧 Spotify Style Player</h1>

<div class="player">

<img id="cover">

<h3 id="title">곡 없음</h3>

<audio id="audio"></audio>

<div>
    <span id="current">0:00</span>
    <input type="range" id="progress" class="progress" value="0">
    <span id="duration">0:00</span>
</div>

<div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">▶/⏸</button>
    <button onclick="next()">⏭</button>
</div>

<div>
    <button onclick="shuffle()">🔀</button>
    <button onclick="repeat()">🔁</button>
    <button onclick="openYT()">▶ YouTube</button>
</div>

</div>

<h2>📀 플레이리스트</h2>

<input id="t" placeholder="제목">
<input id="mp3" placeholder="MP3 URL (없어도 됨)">
<input id="yt" placeholder="YouTube ID">
<button onclick="add()">추가</button>

<div class="list" id="list"></div>

<script>
let list=[];
let index=0;
let isShuffle=false;
let isRepeat=false;

const audio=document.getElementById("audio");

// ===== 로드 =====
window.onload=()=>{
    const data=localStorage.getItem("musicList");
    const idx=localStorage.getItem("musicIndex");

    if(data) list=JSON.parse(data);
    if(idx) index=parseInt(idx);

    render();

    if(list[index]){
        loadTrack(index);
    }
};

// ===== 저장 =====
function save(){
    localStorage.setItem("musicList",JSON.stringify(list));
    localStorage.setItem("musicIndex",index);
}

// ===== 썸네일 =====
function thumb(id){
    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
}

// ===== 추가 =====
function add(){
    const t=document.getElementById("t").value;
    const mp3=document.getElementById("mp3").value;
    const yt=document.getElementById("yt").value;

    if(!t) return alert("제목 입력!");

    list.push({
        t,
        mp3,
        yt
    });

    save();
    render();
}

// ===== 트랙 로드 =====
function loadTrack(i){
    index=i;

    const v=list[i];

    // mp3 있으면 audio 재생
    if(v.mp3){
        audio.src=v.mp3;
    }

    document.getElementById("title").innerText=v.t;

    // 썸네일 자동
    if(v.yt){
        document.getElementById("cover").src=thumb(v.yt);
    }

    save();
}

// ===== 재생 =====
function play(i){
    loadTrack(i);

    if(list[i].mp3){
        audio.play();
    }

    render();
}

// ===== 토글 =====
function toggle(){
    if(audio.src){
        if(audio.paused) audio.play();
        else audio.pause();
    }
}

// ===== 다음곡 =====
function next(){
    if(isShuffle){
        index=Math.floor(Math.random()*list.length);
    }else{
        index++;
    }

    if(index>=list.length){
        if(isRepeat) index=0;
        else return;
    }

    play(index);
}

// ===== 이전곡 =====
function prev(){
    index--;
    if(index<0) index=0;
    play(index);
}

// ===== 자동재생 =====
audio.onended=()=>{
    next();
};

// ===== 진행바 =====
audio.ontimeupdate=()=>{
    const progress=document.getElementById("progress");
    progress.value=(audio.currentTime/audio.duration)*100;

    document.getElementById("current").innerText=format(audio.currentTime);
    document.getElementById("duration").innerText=format(audio.duration);
};

// ===== 드래그 =====
document.getElementById("progress").oninput=(e)=>{
    audio.currentTime=(e.target.value/100)*audio.duration;
};

// ===== 시간 =====
function format(s){
    if(!s) return "0:00";
    const m=Math.floor(s/60);
    const sec=Math.floor(s%60);
    return m+":"+(sec<10?"0":"")+sec;
}

// ===== 셔플 =====
function shuffle(){
    isShuffle=!isShuffle;
}

// ===== 반복 =====
function repeat(){
    isRepeat=!isRepeat;
}

// ===== 유튜브 열기 =====
function openYT(){
    const v=list[index];
    if(!v?.yt) return alert("유튜브 ID 없음");

    window.open(`https://yewtu.be/watch?v=${v.yt}`);
}

// ===== 리스트 =====
function render(){
    const box=document.getElementById("list");
    box.innerHTML="";

    list.forEach((v,i)=>{
        const d=document.createElement("div");
        d.className="item";
        if(i===index) d.classList.add("active");

        d.innerText=v.t;
        d.onclick=()=>play(i);

        box.appendChild(d);
    });
}
</script>

</body>
</html>
