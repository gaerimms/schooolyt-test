<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YOUTUBE PLAYER FINAL</title>

<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial;
    text-align:center;
}

.player{
    width:90%;
    max-width:800px;
    margin:30px auto;
    position:relative;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

/* 유튜브처럼 */
.player img{
    width:100%;
    display:block;
}

.playBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:20px;
    cursor:pointer;
}

/* 리스트 */
#list{
    max-width:700px;
    margin:auto;
}

.item{
    display:flex;
    background:#161b22;
    margin:10px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.item img{
    width:120px;
    margin-right:10px;
}

.active{
    border:2px solid #2ea043;
}
</style>
</head>

<body>

<h1>🎬 YOUTUBE PLAYER (학교용 최종)</h1>

<input id="title" placeholder="곡 제목">
<input id="vid" placeholder="YouTube ID">
<button onclick="add()">추가</button>

<div class="player" onclick="play()">
    <img id="thumb">
    <div class="playBtn">▶</div>
</div>

<h2>📀 목록</h2>
<div id="list"></div>

<script>
let list=[];
let index=0;

// 썸네일
function thumb(id){
    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
}

// 추가
function add(){
    const t=document.getElementById("title").value;
    const id=document.getElementById("vid").value;

    list.push({t,id});
    render();
}

// 선택
function select(i){
    index=i;

    document.getElementById("thumb").src=thumb(list[i].id);

    render();
}

// 재생 (우회)
function play(){
    const id=list[index]?.id;
    if(!id) return;

    // 🔥 유튜브 우회 플레이
    window.open(`https://yewtu.be/watch?v=${id}`);
}

// 자동 다음곡 느낌 (클릭 기반)
function next(){
    index++;
    if(index>=list.length) index=0;
    select(index);
}

// 목록
function render(){
    const box=document.getElementById("list");
    box.innerHTML="";

    list.forEach((v,i)=>{
        let d=document.createElement("div");
        d.className="item";
        if(i===index) d.classList.add("active");

        d.innerHTML=`
        <img src="${thumb(v.id)}">
        <div onclick="select(${i})">${v.t}</div>
        `;

        box.appendChild(d);
    });
}
</script>

</body>
</html>
