<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YOUTUBE PLAYER PRO</title>

<style>
body {
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
    transition:0.3s;
}

.light {
    background:#ffffff;
    color:#000;
}

input {
    padding:10px;
    border-radius:8px;
    background:#161b22;
    color:white;
    border:none;
    margin:5px;
}

button {
    padding:10px;
    border-radius:8px;
    background:#238636;
    color:white;
    border:none;
    cursor:pointer;
}

.player {
    position:relative;
    width:90%;
    max-width:800px;
    padding-top:56.25%;
    margin:30px auto;
}

iframe {
    position:absolute;
    width:100%;
    height:100%;
}

#listBox {
    max-width:700px;
    margin:auto;
    background:#161b22;
    padding:15px;
    border-radius:10px;
}

.item {
    background:#21262d;
    padding:10px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    cursor:pointer;
}

.item img {
    width:120px;
    margin-right:10px;
    border-radius:8px;
}

.active {
    border:2px solid #2ea043;
}
</style>
</head>

<body>

<h1>🔥 YOUTUBE PLAYER PRO</h1>

<!-- 로그인 -->
<input id="userID" placeholder="아이디 입력">
<button onclick="login()">로그인</button>

<!-- 테마 -->
<button onclick="toggleTheme()">🌙/☀ 테마 변경</button>

<br><br>

<input id="videoTitle" placeholder="곡 제목">
<input id="videoID" placeholder="YouTube ID">
<button onclick="addToList()">저장</button>

<div class="player">
<iframe id="ytPlayer"></iframe>
</div>

<h2>📀 재생목록</h2>
<div id="listBox"></div>

<script>
let savedList=[];
let currentIndex=-1;
let currentUser="guest";

// ===== 로그인 =====
function login(){
    const id=document.getElementById("userID").value.trim();
    if(!id) return alert("아이디 입력!");

    currentUser=id;
    loadUserData();

    alert(id+" 로그인 완료!");
}

// ===== 사용자 데이터 로드 =====
function loadUserData(){
    const data=localStorage.getItem("yt_"+currentUser);
    const idx=localStorage.getItem("yt_idx_"+currentUser);

    savedList = data ? JSON.parse(data) : [];
    currentIndex = idx ? parseInt(idx) : -1;

    renderList();

    if(currentIndex>=0 && savedList[currentIndex]){
        playVideoIndex(currentIndex);
    }
}

// ===== 저장 =====
function save(){
    localStorage.setItem("yt_"+currentUser,JSON.stringify(savedList));
    localStorage.setItem("yt_idx_"+currentUser,currentIndex);
}

// ===== 테마 =====
function toggleTheme(){
    document.body.classList.toggle("light");

    const theme = document.body.classList.contains("light") ? "light" : "dark";
    localStorage.setItem("theme",theme);
}

// 테마 유지
window.onload=function(){
    const theme=localStorage.getItem("theme");
    if(theme==="light") document.body.classList.add("light");

    login(); // 자동 guest 로그인
}

// ===== 썸네일 =====
function thumb(id){
    return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

// ===== 재생 =====
function playVideoIndex(i){
    currentIndex=i;

    document.getElementById("ytPlayer").src=
    `https://www.youtube.com/embed/${savedList[i].id}?autoplay=1&mute=1`;

    save();
    renderList();
}

// ===== 추가 =====
function addToList(){
    const title=document.getElementById("videoTitle").value.trim();
    const id=document.getElementById("videoID").value.trim();

    if(!title||!id) return alert("입력!");

    savedList.push({title,id});
    save();
    renderList();
}

// ===== 삭제 =====
function deleteItem(i){
    savedList.splice(i,1);
    save();
    renderList();
}

// ===== 목록 =====
function renderList(){
    const box=document.getElementById("listBox");
    box.innerHTML="";

    savedList.forEach((v,i)=>{
        let div=document.createElement("div");
        div.className="item";

        if(i===currentIndex) div.classList.add("active");

        div.innerHTML=`
        <img src="${thumb(v.id)}">
        <div onclick="playVideoIndex(${i})">${v.title}</div>
        <button onclick="deleteItem(${i})">삭제</button>
        `;

        box.appendChild(div);
    });
}
</script>

</body>
</html>
